<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Reset Page</title>
    <link rel="stylesheet" href="PasswordReset.css">
</head>
<body>
<form>
    <fieldset>
        <label for="new-password">Enter new password</label><br>
        <input type="password" id="new-password" name="new-password" placeholder="Value"><br><br>

        <label for="confirm-password">Re-enter new password</label><br>
        <input type="password" id="confirm-password" name="confirm-password" placeholder="Value"><br><br>

        <button type="submit">Confirm</button>
    </fieldset>
</form>
<script src="PasswordReset.ts"></script>
</body>
</html>
