<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OTP Verification</title>
    <link rel="stylesheet" href="GetOTP.css">
</head>
<body>
<main class="otp-container">

    <form class="card">
        <fieldset>
            <label for="email">Email</label><br>
            <input type="email" id="email" name="email" placeholder="Value"><br><br>
            <button type="button">Get OTP</button>
        </fieldset>
    </form>

    <form class="card">
        <fieldset>
            <label for="otp">Enter OTP</label><br>
            <input type="text" id="otp" name="otp" placeholder="Value"><br><br>
            <button type="submit">Submit</button>
        </fieldset>
    </form>

</main>
<script src="GetOTP.ts"></script>
</body>
</html>
